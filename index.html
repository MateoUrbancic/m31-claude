<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Marketing 31, Scale Your Info-Business</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles-light.css" />
<link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet" />
<script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
</head>
<body data-density="regular">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="bg-texture.jsx"></script>
<script type="text/babel" src="sections-top-light.jsx"></script>
<script type="text/babel" src="sections-bottom-light.jsx"></script>

<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#2A6FDB",
  "headline": "We build extremely profitable paid ads acquisition systems |in 21 days or less.|",
  "density": "regular",
  "showMarquee": true,
  "showFounder": true
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    document.documentElement.style.setProperty('--accent', t.accent);
    document.documentElement.style.setProperty('--accent-2', t.accent);
    document.body.dataset.density = t.density;
  }, [t.accent, t.density]);

  return (
    <>
      <Nav />
      <Hero headline={t.headline} />
      <ClientLogos />
      {t.showMarquee && <MarqueeRow />}
      <FunnelTypes />
      <Services />
      <Process />
      <Cases />
      <FunnelShowcase />
      <StaticAds />
      <Fit />
      {t.showFounder && <Founder />}
      <FAQ />
      <FinalCTA />
      <Footer />

      <TweaksPanel title="Tweaks">
        <TweakSection label="Visual" />
        <TweakColor label="Accent" value={t.accent} onChange={(v) => setTweak('accent', v)} />
        <TweakRadio label="Density" value={t.density}
                    options={['tight', 'regular', 'airy']}
                    onChange={(v) => setTweak('density', v)} />

        <TweakSection label="Hero copy" />
        <TweakSelect label="Hook" value={t.headline}
                     options={[
                       { value: "We build extremely profitable paid ads acquisition systems |in 21 days or less.|", label: '21 days' },
                       { value: 'Three funnels. Our ads. A calendar full of |qualified calls.|', label: 'Three funnels' },
                       { value: 'We build your funnel and run the ads, |so qualified calls book themselves.|', label: 'Build + run' },
                       { value: 'Turn ad spend into |qualified, booked calls.|', label: 'Booked calls' },
                     ]}
                     onChange={(v) => setTweak('headline', v)} />
        <TweakText label="Headline" value={t.headline}
                   placeholder="Use | | to wrap the italic accent"
                   onChange={(v) => setTweak('headline', v)} />

        <TweakSection label="Sections" />
        <TweakToggle label="Show marquee"  value={t.showMarquee} onChange={(v) => setTweak('showMarquee', v)} />
        <TweakToggle label="Show founder"  value={t.showFounder} onChange={(v) => setTweak('showFounder', v)} />

        <TweakSection label="Accent presets" />
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 6 }}>
          {[
            ['#2A6FDB', 'Blue'],
            ['#179A52', 'Green'],
            ['#6D4ADB', 'Violet'],
            ['#0E8C8C', 'Teal'],
            ['#D9622B', 'Orange'],
          ].map(([c]) => (
            <button key={c} onClick={() => setTweak('accent', c)}
              style={{ height: 22, borderRadius: 6, border: '.5px solid rgba(0,0,0,.12)', background: c, cursor: 'pointer' }}
              aria-label={c} />
          ))}
        </div>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
