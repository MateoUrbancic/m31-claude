<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Marketing 31 — Scale Your Info-Business</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body data-density="regular">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="sections-top.jsx"></script>
<script type="text/babel" src="sections-bottom.jsx"></script>

<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#4A9EFF",
  "headline": "Meta Ads that pay for themselves |from day one.|",
  "density": "regular",
  "showMarquee": true,
  "showFounder": true
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    document.documentElement.style.setProperty('--accent', t.accent);
    // Derive a slightly brighter version for the secondary accent
    document.documentElement.style.setProperty('--accent-2', t.accent);
    document.body.dataset.density = t.density;
  }, [t.accent, t.density]);

  return (
    <>
      <Nav />
      <Hero headline={t.headline} />
      {t.showMarquee && <MarqueeRow />}
      <Stats />
      <Services />
      <Process />
      <Cases />
      <Testimonials />
      {t.showFounder && <Founder />}
      <Fit />
      <FAQ />
      <FinalCTA />
      <Footer />

      <TweaksPanel title="Tweaks">
        <TweakSection label="Visual" />
        <TweakColor label="Accent" value={t.accent} onChange={(v) => setTweak('accent', v)} />
        <TweakRadio label="Density" value={t.density}
                    options={['tight', 'regular', 'airy']}
                    onChange={(v) => setTweak('density', v)} />

        <TweakSection label="Hero copy" />
        <TweakText label="Headline" value={t.headline}
                   placeholder="Use | | to wrap the italic accent"
                   onChange={(v) => setTweak('headline', v)} />

        <TweakSection label="Sections" />
        <TweakToggle label="Show marquee"  value={t.showMarquee} onChange={(v) => setTweak('showMarquee', v)} />
        <TweakToggle label="Show founder"  value={t.showFounder} onChange={(v) => setTweak('showFounder', v)} />

        <TweakSection label="Accent presets" />
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 6 }}>
          {[
            ['#5BFF8F', 'Mint'],
            ['#B8FF45', 'Lime'],
            ['#7CC2FF', 'Ice'],
            ['#FF6A3D', 'Heat'],
            ['#E6E6E6', 'Steel'],
          ].map(([c]) => (
            <button key={c} onClick={() => setTweak('accent', c)}
              style={{ height: 22, borderRadius: 6, border: '.5px solid rgba(0,0,0,.1)', background: c, cursor: 'pointer' }}
              aria-label={c} />
          ))}
        </div>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
