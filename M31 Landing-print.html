<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Marketing 31 — Scale Your Info-Business</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
<style>
  @media print {
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }
    
    @page {
      size: A4;
      margin: 0;
    }
    
    body {
      margin: 0;
      padding: 0;
    }
    
    /* Remove interactive elements */
    .nav,
    .btn,
    .tweaks-panel,
    #vidalytics_embed_3EtxWJrQAsHugKqW,
    a[href^="https://calendly"],
    a[href^="#"] {
      display: none !important;
    }
    
    /* Prevent clipping and overflow */
    * {
      overflow: visible !important;
      break-inside: avoid;
    }
    
    section {
      break-inside: avoid;
      page-break-inside: avoid;
      break-after: page;
      page-break-after: always;
    }
    
    section:last-child {
      break-after: auto;
      page-break-after: auto;
    }
    
    /* Remove animations and transitions */
    * {
      animation: none !important;
      transition: none !important;
    }
    
    /* Make glows visible in print */
    .glow {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }
    
    /* Ensure text is readable */
    h1, h2, h3, h4, h5, h6, p {
      orphans: 3;
      widows: 3;
    }
    
    /* VSL section fallback */
    .vidalytics-fallback {
      display: block !important;
      padding: 40px;
      background: #f5f5f5;
      border: 1px solid #ddd;
      text-align: center;
      color: #666;
      font-size: 14px;
      margin: 20px 0;
    }
  }
  
  @media screen {
    .vidalytics-fallback {
      display: none;
    }
  }
</style>
</head>
<body data-density="regular">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="sections-top.jsx"></script>
<script type="text/babel" src="sections-bottom.jsx"></script>

<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#4A9EFF",
  "headline": "Scale with ads that pay for themselves |from day one.|",
  "density": "regular",
  "showMarquee": true,
  "showFounder": true
}/*EDITMODE-END*/;

// Minimal useTweaks hook for print (no persistence needed)
function useTweaks(defaults) {
  const [state] = React.useState(defaults);
  const setTweak = () => {};
  return [state, setTweak];
}

// Minimal TweaksPanel stub for print
function TweaksPanel() {
  return null;
}

function TweakSection() { return null; }
function TweakColor() { return null; }
function TweakRadio() { return null; }
function TweakText() { return null; }
function TweakToggle() { return null; }

// Simple Nav without buttons for print
function Nav() {
  return (
    <nav className="nav" style={{ marginBottom: 40 }}>
      <div className="nav-inner">
        <a href="#top" className="nav-logo">
          <span className="mark">M</span>
          <span>Marketing<span style={{ color: 'var(--accent)' }}>31</span></span>
        </a>
      </div>
    </nav>
  );
}

function App() {
  const [t] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    document.documentElement.style.setProperty('--accent', t.accent);
    document.documentElement.style.setProperty('--accent-2', t.accent);
    document.body.dataset.density = t.density;
    
    // Wait for fonts to load before printing
    if (document.fonts) {
      document.fonts.ready.then(() => {
        setTimeout(() => {
          window.print();
        }, 500);
      });
    } else {
      setTimeout(() => {
        window.print();
      }, 1000);
    }
  }, [t.accent, t.density]);

  return (
    <>
      <Nav />
      <Hero headline={t.headline} />
      {t.showMarquee && <MarqueeRow />}
      <Cases />
      <WhyLowTicket />
      <Services />
      <Process />
      <Testimonials />
      {t.showFounder && <Founder />}
      <Fit />
      <FAQ />
      <FinalCTA />
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
